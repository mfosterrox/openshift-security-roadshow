---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-secrets-app-html
  namespace: vault
  labels:
    app: vault-secrets-app
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <title>Vault Secrets App</title>
      <style>
        body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 3rem auto; padding: 0 1rem; color: #151515; }
        h1 { color: #ee0000; }
        code { background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 3px; }
      </style>
    </head>
    <body>
      <h1>Vault Secrets App</h1>
      <p>Vault Agent Injector demo — secrets mount at <code>/vault/secrets/</code>.</p>
    </body>
    </html>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-serviceaccount
  namespace: vault
  labels:
    app: vault-secrets-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-secrets-app
  namespace: vault
  labels:
    app: vault-secrets-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-secrets-app
  template:
    metadata:
      labels:
        app: vault-secrets-app
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-status: "update"
        vault.hashicorp.com/role: "vault-role"
        vault.hashicorp.com/agent-inject-address: "http://vault.vault.svc:8200"
        vault.hashicorp.com/agent-inject-containers: "web"
        vault.hashicorp.com/agent-inject-secret-login: "secret/login"
        vault.hashicorp.com/agent-inject-template-login: |
          {{- with secret "secret/login" -}}
          rhos-token={{ index .Data.data "rhos-token" }}
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-my-first-secret: "secret/my-first-secret"
        vault.hashicorp.com/agent-inject-template-my-first-secret: |
          {{- with secret "secret/my-first-secret" -}}
          username={{ .Data.data.username }}
          password={{ .Data.data.password }}
          {{- end }}
    spec:
      serviceAccountName: vault-serviceaccount
      volumes:
        - name: html
          configMap:
            name: vault-secrets-app-html
      containers:
        - name: web
          image: docker.io/nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: vault-secrets-app
  namespace: vault
  labels:
    app: vault-secrets-app
spec:
  selector:
    app: vault-secrets-app
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vault-secrets-app
  namespace: vault
  labels:
    app: vault-secrets-app
spec:
  to:
    kind: Service
    name: vault-secrets-app
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
